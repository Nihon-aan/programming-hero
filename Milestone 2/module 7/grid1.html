<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container{
            display: grid;
            gap: 5px;
            grid-template-columns: repeat(6,1fr);
            grid-template-rows: repeat(6,200px);

        }

       .big-box{
            grid-column: span 6;
            grid-row: span 2;
        }

        .normal-box{
             grid-column: span 2;
            grid-row: span 2;
        } 

        .chepta-box{
            grid-column: span 2;
            grid-row: span 1;
        }

        img{
            width:100%;
            height:100%;
        }
    </style>
</head>
<body>
    <div class="container">

    <div class="box big-box"><img src="../responsive-layout-example/images/A.jpg" alt=""></div>
    <div class="box normal-box"><img src="../responsive-layout-example/images/B.jpg" alt=""></div>
    <div class="box normal-box"><img src="../responsive-layout-example/images/C.jpg" alt=""></div>
    <div class="box chepta-box"><img src="../responsive-layout-example/images/D.jpg" alt=""></div>
    <div class="box chepta-box"><img src="../responsive-layout-example/images/E.jpg" alt=""></div>
    <div class="box normal-box"><img src="../responsive-layout-example/images/F.jpg" alt=""></div>
    <div class="box"><img src="../responsive-layout-example/images/G.jpg" alt=""></div>
    <div class="box"><img src="../responsive-layout-example/images/G.jpg" alt=""></div>
    <!-- <div class="box"><img src="../responsive-layout-example/images/H.jpg" alt=""></div> -->
    <div class="box normal-box"><img src="../responsive-layout-example/images/I.jpg" alt=""></div>

    <div class="box"><img src="../responsive-layout-example/images/G.jpg" alt=""></div>
    <div class="box"><img src="../responsive-layout-example/images/G.jpg" alt=""></div>

    </div>
    
</body>
</html>
