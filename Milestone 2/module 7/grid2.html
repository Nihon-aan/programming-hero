<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box{
            background-color: rgb(73, 81, 94);
            padding: 20px;

        }
        .container{
            display:grid;
            gap:30px;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 200px) 50px 50px;
        }

        .box1{
            grid-row: span 5;
        }

        .box2{
            grid-column: span 3;
        }

        .red{
            background-color: tomato;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box box1">box1</div>
        <div class="box"></div>
        <div class="box">box3</div>
        <div class="box">box4</div>
        <div class="box">box5</div>
        <div class="box red">box6</div>
        <div class="box red">box7</div>
        <div class="box">box8</div>
        <div class="box red">box9</div>
        <div class="box red">box10</div>
        <div class="box box2">box11</div>
        <div class="box box2">box12</div>
    </div>
    
</body>
</html>
