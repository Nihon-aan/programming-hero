<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Document</title>

        .date, .week{

            border-radius:5px;
            font-size:1.25em;

        }

        .week{

        }

        .date:hover{

</head>
